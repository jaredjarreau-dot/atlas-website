           C 502,494 489,487 478,478 L 466,468
           C 455,458 446,448 438,437 L 431,426
           C 425,416 420,406 416,396 L 413,384
           C 410,374 410,364 412,354 L 416,342
           C 420,332 426,324 434,318 L 444,312
           C 454,307 465,304 477,303 L 491,303
           C 504,303 516,305 527,309 L 539,315
           C 550,321 560,329 567,339 L 573,350
           C 578,360 580,371 578,382 L 574,394
           C 568,406 560,416 549,424 L 537,431
           C 524,438 510,442 495,444 L 480,445
           C 466,445 452,443 438,438 L 424,430
           C 413,423 403,413 396,401 L 390,388
           C 386,375 386,361 390,348 L 397,336
           C 404,324 414,314 428,306 L 444,300
           C 460,295 478,292 495,293 L 512,296
           C 528,300 543,307 555,318 L 565,330
