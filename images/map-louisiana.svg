  <text x="155" y="222" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#2A4A5A" transform="rotate(5,155,222)">Red River</text>

  <!-- ── Bayou lines ── -->
  <path d="M 148,478 C 168,498 186,516 202,536 C 215,554 224,574 226,594"
        stroke="#2A4A5A" stroke-width="1.2" stroke-dasharray="4,3" stroke-linecap="round" fill="none"/>
  <path d="M 282,535 C 300,550 316,566 330,583 C 344,598 354,614 358,630"
        stroke="#2A4A5A" stroke-width="1.2" stroke-dasharray="4,3" stroke-linecap="round" fill="none"/>
  <path d="M 448,556 C 466,567 483,580 498,594 C 512,607 524,621 532,636"
        stroke="#2A4A5A" stroke-width="1.2" stroke-dasharray="4,3" stroke-linecap="round" fill="none"/>

  <!-- ── State outline on top of fills ── -->
  <path d="M 36,105 L 596,105 L 596,560
           C 582,576 565,590 546,600 L 526,610
           C 508,617 488,621 468,621 L 448,619
           C 430,615 413,607 398,595 L 385,581
           C 374,567 365,550 360,533 L 358,515
           C 356,498 357,480 360,464 L 365,448
           C 370,432 377,417 383,403
           L 338,392
           C 325,373 310,355 294,339
           L 280,322
           C 266,308 251,296 236,287
           C 221,278 206,274 192,273
           L 175,272
           C 159,272 143,274 129,279
           L 116,286
           C 102,294 90,304 80,317
           L 70,330
           C 60,344 52,360 46,377
           L 40,397
           C 36,415 34,434 33,452
           L 33,472
           C 33,490 35,507 39,524
           L 45,544
           C 50,562 56,578 60,593
           L 62,606
           C 64,617 63,627 59,636
           L 51,650
           C 44,664 38,678 35,692
           L 34,700"
        stroke="#4A2E0A" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
  <line x1="36" y1="105" x2="596" y2="105" stroke="#4A2E0A" stroke-width="2.5"/>

  <!-- ── Gulf coast wave marks ── -->
  <path d="M 30,714 C 50,707 70,721 90,714 C 110,707 130,721 150,714 C 170,707 190,721 210,714
           C 230,707 250,721 270,714 C 290,707 310,721 330,714 C 350,707 370,721 390,714
           C 410,707 430,721 450,714 C 470,707 490,721 510,714 C 530,707 550,721 570,714
           C 590,707 610,721 630,714 C 650,707 670,721 675,714"
        stroke="#2A4A5A" stroke-width="1.0" fill="none" opacity="0.6"/>
  <path d="M 30,729 C 50,722 70,736 90,729 C 110,722 130,736 150,729 C 170,722 190,736 210,729
           C 230,722 250,736 270,729 C 290,722 310,736 330,729 C 350,722 370,736 390,729
           C 410,722 430,736 450,729 C 470,722 490,736 510,729 C 530,722 550,736 570,729
           C 590,722 610,736 630,729 C 650,722 670,736 675,729"
        stroke="#2A4A5A" stroke-width="0.8" fill="none" opacity="0.5"/>
  <text x="350" y="760" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#2A4A5A" letter-spacing="3">Gulf of Mexico</text>

  <!-- ── City markers ── -->
  <!-- New Orleans -->
  <circle cx="488" cy="542" r="6" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1.2"/>
  <text x="488" y="528" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#4A2E0A">New Orleans</text>

  <!-- Baton Rouge -->
  <circle cx="415" cy="472" r="5" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1"/>
  <text x="415" y="459" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#4A2E0A">Baton Rouge</text>

  <!-- Shreveport -->
  <circle cx="124" cy="146" r="5" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="144" y="142" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Shreveport</text>

  <!-- Lafayette -->
  <circle cx="308" cy="496" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="320" y="493" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Lafayette</text>

  <!-- Lake Charles -->
  <circle cx="110" cy="492" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="122" y="489" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Lake Charles</text>

  <!-- Alexandria -->
  <circle cx="268" cy="316" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="280" y="313" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Alexandria</text>

  <!-- Monroe -->
  <circle cx="366" cy="158" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="378" y="155" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Monroe</text>

  <!-- ── Title ── -->
  <text x="350" y="56" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="#4A2E0A" letter-spacing="6">LOUISIANA</text>
  <text x="350" y="76" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#4A2E0A" letter-spacing="3">UNION, JUSTICE &amp; CONFIDENCE</text>
  <line x1="210" y1="82" x2="490" y2="82" stroke="#4A2E0A" stroke-width="0.8"/>

  <!-- ── Compass rose (upper right) ── -->
  <g transform="translate(590,168)">
    <circle cx="0" cy="0" r="38" fill="#D4B87A" fill-opacity="0.25" stroke="#4A2E0A" stroke-width="1"/>
    <circle cx="0" cy="0" r="30" stroke="#4A2E0A" stroke-width="0.5"/>
    <polygon points="0,-35 -6,-10 0,-19 6,-10" fill="#4A2E0A"/>
    <polygon points="0,35  -6,10  0,19  6,10"  fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="-35,0 -10,-5 -19,0 -10,5" fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="35,0  10,-5  19,0  10,5"  fill="#4A2E0A" fill-opacity="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#4A2E0A"/>
    <text x="0"   y="-44" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">N</text>
    <text x="0"   y="54"  text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">S</text>
    <text x="-48" y="4"   text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">W</text>
    <text x="48"  y="4"   text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">E</text>
  </g>

  <!-- ── Cartouche (lower right) ── -->
  <rect x="458" y="628" width="212" height="116" rx="4" fill="#D4B87A" fill-opacity="0.25" stroke="#4A2E0A" stroke-width="1.5"/>
  <rect x="463" y="633" width="202" height="106" rx="2" stroke="#4A2E0A" stroke-width="0.5"/>
  <text x="564" y="652" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#4A2E0A">A MAP OF THE</text>
  <text x="564" y="670" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#4A2E0A">STATE OF</text>
  <text x="564" y="688" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#4A2E0A">LOUISIANA</text>
  <line x1="473" y1="694" x2="655" y2="694" stroke="#4A2E0A" stroke-width="0.6"/>
  <text x="564" y="708" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">Showing Parishes, Rivers</text>
  <text x="564" y="721" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">&amp; Principal Waterways</text>
  <text x="564" y="734" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4A2E0A">28°56′–33°01′ N</text>

</svg>
