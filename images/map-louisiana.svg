  <path d="M 100,490 C 120,495 138,492 155,486" stroke="#2A4A5A" stroke-width="1.0" stroke-dasharray="3,3"/>
  <path d="M 130,510 C 148,516 165,514 180,508" stroke="#2A4A5A" stroke-width="1.0" stroke-dasharray="3,3"/>
  <path d="M 200,525 C 218,530 234,528 248,522" stroke="#2A4A5A" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M 240,515 C 255,519 270,516 284,510" stroke="#2A4A5A" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Bayou label area -->
  <text x="130" y="532" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A">bayou country</text>

  <!-- ── Mississippi River (the main artery) ── -->
  <path d="M 430,148 C 428,165 426,185 424,208 C 422,230 420,255 418,278
