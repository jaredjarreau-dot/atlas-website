  <ellipse cx="530" cy="490" rx="86" ry="38" fill="#6B9BB8" fill-opacity="0.75" stroke="#2A4A5A" stroke-width="1.2"/>
  <text x="530" y="494" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A">Lake Pontchartrain</text>

  <!-- ── Mississippi River (filled wide path) ── -->
  <path d="M 395,105 C 390,145 384,183 380,220 C 376,258 373,295 372,330
           C 371,365 371,400 373,433 C 375,466 379,498 383,528
           C 387,558 391,586 393,612 L 395,638
           C 396,654 397,668 396,680 L 393,700"
        stroke="#2A4A5A" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M 395,105 C 390,145 384,183 380,220 C 376,258 373,295 372,330
