  <path d="M 578,367 C 576,378 572,390 566,402 L 558,416
           C 550,430 540,443 528,454 L 514,464
           C 500,474 484,481 467,486 L 450,489
           C 434,491 418,490 402,487 L 386,481
           C 372,475 359,467 348,456 L 339,444
           C 332,433 328,421 327,408 L 328,394
           C 330,380 335,368 344,358 L 356,348
           C 369,339 384,334 400,332 L 418,332
           C 435,332 451,336 465,343 L 478,352
           C 490,361 499,372 504,385 L 506,398
           C 506,411 502,423 494,432 L 484,440"
        stroke="#4A2E0A" stroke-width="2.2" stroke-linejoin="round"/>
