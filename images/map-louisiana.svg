           C 419,406 424,417 430,427 C 436,437 443,445 450,452
           C 457,459 463,464 468,470 C 473,476 476,482 477,489
           L 476,498 C 474,506 469,513 462,518
           L 450,524 C 440,528 428,531 416,532 L 400,532"
        stroke="#2A4A5A" stroke-width="5" stroke-linecap="round"/>
  <!-- Secondary channel (west side of river) -->
  <path d="M 422,148 C 420,165 418,185 416,208 C 414,230 412,255 410,278
           C 408,300 406,322 405,344 C 404,362 405,378 408,393"
        stroke="#2A4A5A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="390" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-style="italic" fill="#2A4A5A" transform="rotate(-90,390,310)">Mississippi River</text>

  <!-- ── Mississippi Delta (bird-foot) ── -->
  <path d="M 477,489 C 478,498 478,507 476,516 L 473,528
           C 470,540 464,550 457,558 L 448,566
           C 442,572 434,576 426,578 L 415,578"
        stroke="#2A4A5A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Delta fingers (bird-foot) -->
  <path d="M 463,548 C 460,556 456,564 450,571 L 443,577" stroke="#2A4A5A" stroke-width="2"/>
  <path d="M 472,545 C 474,555 474,565 471,575 L 467,584 L 462,592" stroke="#2A4A5A" stroke-width="2"/>
  <path d="M 478,548 C 482,558 485,568 485,580 L 483,592" stroke="#2A4A5A" stroke-width="2"/>
  <path d="M 482,553 C 487,563 490,574 490,587 L 488,600" stroke="#2A4A5A" stroke-width="1.5"/>
  <text x="490" y="580" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A">Delta</text>

  <!-- ── Lake Pontchartrain ── -->
  <ellipse cx="370" cy="466" rx="115" ry="48"
           fill="#2A4A5A" fill-opacity="0.08" stroke="#2A4A5A" stroke-width="1.5"/>
  <!-- Wave texture in lake -->
  <path d="M 290,460 C 305,455 320,465 335,460 S 365,455 380,460" stroke="#2A4A5A" stroke-width="0.6"/>
  <path d="M 325,472 C 340,467 355,477 370,472 S 400,467 415,472" stroke="#2A4A5A" stroke-width="0.6"/>
  <text x="370" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-style="italic" fill="#2A4A5A">Lake Pontchartrain</text>

  <!-- ── Red River ── -->
  <path d="M 68,245 C 95,242 125,240 155,242 C 185,244 212,250 238,260
           C 260,269 280,281 300,293 C 318,304 335,315 352,325
           C 366,334 378,342 390,348"
        stroke="#2A4A5A" stroke-width="1.8" stroke-linecap="round"/>
  <text x="175" y="252" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A" transform="rotate(-2,175,252)">Red River</text>

  <!-- ── City markers ── -->
  <!-- New Orleans -->
  <circle cx="462" cy="496" r="7" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1.4"/>
  <text x="490" y="494" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#4A2E0A">New Orleans</text>
  <!-- Baton Rouge -->
  <circle cx="392" cy="435" r="5" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1.2"/>
  <text x="318" y="430" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#4A2E0A">Baton Rouge</text>
  <!-- Shreveport -->
  <circle cx="130" cy="205" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="144" y="202" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Shreveport</text>
  <!-- Lake Charles -->
  <circle cx="95" cy="448" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="108" y="444" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Lake Charles</text>

  <!-- ── Title ── -->
  <text x="350" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="#4A2E0A" letter-spacing="4">LOUISIANA</text>
  <text x="350" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A" letter-spacing="3">UNION, JUSTICE &amp; CONFIDENCE</text>
  <line x1="220" y1="98" x2="480" y2="98" stroke="#4A2E0A" stroke-width="0.8"/>

  <!-- ── Compass rose ── -->
  <g transform="translate(584,222)">
    <circle cx="0" cy="0" r="38" stroke="#4A2E0A" stroke-width="1"/>
    <circle cx="0" cy="0" r="30" stroke="#4A2E0A" stroke-width="0.5"/>
    <polygon points="0,-35 -7,-11 0,-19 7,-11" fill="#4A2E0A"/>
    <polygon points="0,35  -7,11  0,19  7,11"  fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="-35,0 -11,-6 -19,0 -11,6" fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="35,0  11,-6  19,0  11,6"  fill="#4A2E0A" fill-opacity="0.5"/>
    <!-- Inter-cardinal -->
    <line x1="21"  y1="-21" x2="26"  y2="-26" stroke="#4A2E0A" stroke-width="0.8"/>
    <line x1="-21" y1="-21" x2="-26" y2="-26" stroke="#4A2E0A" stroke-width="0.8"/>
    <line x1="21"  y1="21"  x2="26"  y2="26"  stroke="#4A2E0A" stroke-width="0.8"/>
    <line x1="-21" y1="21"  x2="-26" y2="26"  stroke="#4A2E0A" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#4A2E0A"/>
    <text x="0"   y="-45" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">N</text>
    <text x="0"   y="58"  text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">S</text>
    <text x="-48" y="5"   text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">W</text>
    <text x="48"  y="5"   text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#4A2E0A">E</text>
  </g>

  <!-- ── Gulf of Mexico label ── -->
  <text x="220" y="640" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-style="italic" fill="#2A4A5A" letter-spacing="3">GULF OF MEXICO</text>
  <!-- Wave marks -->
  <path d="M 68,620 C 90,615 110,625 130,620 S 165,615 185,620" stroke="#2A4A5A" stroke-width="0.7"/>
  <path d="M 80,632 C 100,627 120,637 140,632 S 172,627 192,632" stroke="#2A4A5A" stroke-width="0.7"/>
  <path d="M 220,622 C 240,617 258,627 276,622 S 308,617 326,622" stroke="#2A4A5A" stroke-width="0.7"/>

  <!-- ── Cartouche ── -->
  <rect x="484" y="700" width="178" height="122" rx="4" stroke="#4A2E0A" stroke-width="1.5" fill="#4A2E0A" fill-opacity="0.05"/>
  <rect x="490" y="706" width="166" height="110" rx="2" stroke="#4A2E0A" stroke-width="0.5"/>
  <text x="573" y="726" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#4A2E0A">A GENERAL MAP</text>
  <text x="573" y="742" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#4A2E0A">STATE OF LOUISIANA</text>
  <line x1="500" y1="748" x2="648" y2="748" stroke="#4A2E0A" stroke-width="0.6"/>
  <text x="573" y="763" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">Showing the Principal Rivers</text>
  <text x="573" y="776" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">Lakes &amp; Parishes</text>
  <text x="573" y="791" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4A2E0A">29°–33°N  |  89°–94°W</text>
  <text x="573" y="812" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4A2E0A">© ATLAS ATELIER  2026</text>
