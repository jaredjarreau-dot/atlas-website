    L 408,214
    C 396,208 385,200 375,192
    L 366,184
    C 358,176 352,168 347,160
    L 344,152
    C 342,148 342,146 344,144
    L 350,140
    C 358,138 368,138 380,140
    L 398,144
    C 410,148 422,153 432,158
    L 445,164
    C 456,170 466,176 475,182
    L 484,188
    C 492,194 500,200 507,206
    L 515,213
