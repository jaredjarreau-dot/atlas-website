<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 860" fill="none">

  <!-- Antique map — State of Louisiana -->

  <!-- ── Parchment base ── -->
  <rect width="700" height="860" fill="#F5EED8"/>

  <!-- ── Decorative border ── -->
  <rect x="12" y="12" width="676" height="836" stroke="#4A2E0A" stroke-width="2.5"/>
  <rect x="20" y="20" width="660" height="820" stroke="#4A2E0A" stroke-width="0.8"/>
  <rect x="15" y="15" width="670" height="830" stroke="#4A2E0A" stroke-width="0.5"/>
  <rect x="12"  y="12"  width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>
  <rect x="662" y="12"  width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>
  <rect x="12"  y="822" width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>
  <rect x="662" y="822" width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>

  <!-- ── Graticule ── -->
  <line x1="25" y1="200" x2="675" y2="200" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="25" y1="400" x2="675" y2="400" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="25" y1="600" x2="675" y2="600" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="175" y1="25" x2="175" y2="835" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="350" y1="25" x2="350" y2="835" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="525" y1="25" x2="525" y2="835" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>

  <!-- ── Gulf of Mexico fill ── -->
  <rect x="25" y="700" width="650" height="122" fill="#6B9BB8" fill-opacity="0.5"/>

  <!-- ── North Louisiana zone ── -->
  <rect x="36" y="105" width="596" height="155" fill="#D4B87A" fill-opacity="0.55"/>

  <!-- ── Central Louisiana zone ── -->
  <rect x="36" y="260" width="596" height="120" fill="#CDAA6A" fill-opacity="0.5"/>

