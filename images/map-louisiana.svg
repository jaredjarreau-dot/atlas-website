    M 68,148
    L 625,148
    C 636,148 642,156 640,168
    C 638,185 630,200 616,212
    C 602,224 584,232 564,236
    C 548,239 532,238 516,233
    C 502,228 490,220 479,210
    C 468,200 459,189 450,178
    C 440,167 429,158 416,153
    C 403,148 388,147 375,150
    C 362,153 350,160 342,170
    C 336,178 334,188 336,200
    C 338,212 344,223 352,233
    C 360,242 370,250 381,257
    C 392,264 404,270 417,274
    C 430,278 443,280 456,280
    C 472,280 488,277 504,272
    C 520,267 534,258 547,248
    C 558,239 568,228 577,216
    C 586,204 593,192 598,180
    C 603,170 605,162 604,155"
