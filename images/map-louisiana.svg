  <path d="M 295,380 L 596,380 L 596,560
           C 582,576 565,590 546,600 L 526,610
           C 508,617 488,621 468,621 L 448,619
           C 430,615 413,607 398,595 L 385,581
           C 374,567 365,550 360,533 L 358,515
           C 356,498 357,480 360,464 L 365,448
           L 278,510 Z"
