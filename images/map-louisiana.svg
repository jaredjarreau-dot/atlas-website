           C 387,558 391,586 393,612 L 395,638
           C 396,654 397,668 396,680 L 393,700"
        stroke="#6B9BB8" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.85"/>
  <text x="352" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A" transform="rotate(88,352,320)">Mississippi River</text>

  <!-- ── Bird-foot delta ── -->
  <path d="M 393,700 C 391,718 389,736 387,752 L 385,770"
        stroke="#6B9BB8" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M 390,712 C 378,724 366,736 356,749 C 348,760 343,772 341,784"
        stroke="#6B9BB8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 394,716 C 406,728 416,740 424,754 C 431,764 436,776 437,788"
        stroke="#6B9BB8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 388,718 C 372,730 356,743 346,757 C 337,768 332,781 330,793"
        stroke="#6B9BB8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 396,720 C 412,733 426,745 436,759 C 446,770 452,783 454,795"
        stroke="#6B9BB8" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- ── Atchafalaya River ── -->
  <path d="M 370,335 C 318,370 280,408 254,450 C 234,482 222,516 218,550
           C 214,574 214,596 217,616 L 222,644 C 226,664 229,680 231,700"
        stroke="#6B9BB8" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75"/>
  <text x="248" y="488" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#2A4A5A" transform="rotate(82,248,488)">Atchafalaya</text>

  <!-- ── Red River ── -->
  <path d="M 36,208 C 74,215 112,222 150,230 C 188,238 224,248 258,260
