  <path d="M 36,380 L 295,380 L 278,510 L 220,530 L 155,522 L 92,508 L 50,492 L 36,455 Z"
        fill="#C8AC6A" fill-opacity="0.5"/>
  <!-- Marsh patches -->
  <ellipse cx="155" cy="445" rx="52" ry="26" fill="#8BAE72" fill-opacity="0.5"/>
  <ellipse cx="90"  cy="482" rx="36" ry="17" fill="#8BAE72" fill-opacity="0.45"/>
  <ellipse cx="208" cy="492" rx="40" ry="15" fill="#8BAE72" fill-opacity="0.4"/>
  <ellipse cx="240" cy="460" rx="28" ry="12" fill="#8BAE72" fill-opacity="0.38"/>

