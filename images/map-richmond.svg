  <line x1="465" y1="460" x2="465" y2="530" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="500" y1="460" x2="500" y2="530" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="535" y1="460" x2="535" y2="530" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="570" y1="460" x2="570" y2="530" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="605" y1="460" x2="605" y2="530" stroke="#8B6A3A" stroke-width="0.6"/>

  <!-- ── NEIGHBORHOOD OUTLINES (borders between zones) ── -->
  <line x1="380" y1="160" x2="380" y2="368" stroke="#5C3C18" stroke-width="1.5"/><!-- Downtown/Fan boundary -->
  <line x1="660" y1="160" x2="660" y2="312" stroke="#5C3C18" stroke-width="1.5"/><!-- Downtown/Church Hill -->
  <line x1="250" y1="160" x2="250" y2="368" stroke="#5C3C18" stroke-width="1.5"/><!-- Jackson/Fan west edge -->

  <!-- ── DECORATIVE BORDER ── -->
  <rect x="8"  y="8"  width="784" height="534" stroke="#3A2208" stroke-width="2.5" fill="none"/>
  <rect x="16" y="16" width="768" height="518" stroke="#3A2208" stroke-width="0.8" fill="none"/>
  <!-- Corner fills -->
  <rect x="8"  y="8"  width="24" height="24" fill="#3A2208" fill-opacity="0.15"/>
  <rect x="768" y="8" width="24" height="24" fill="#3A2208" fill-opacity="0.15"/>
  <rect x="8"  y="518" width="24" height="24" fill="#3A2208" fill-opacity="0.15"/>
  <rect x="768" y="518" width="24" height="24" fill="#3A2208" fill-opacity="0.15"/>

  <!-- ── LABELS ── -->
  <!-- River label -->
  <text x="400" y="499" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#2A4A5A" letter-spacing="4">JAMES RIVER</text>
  <!-- Belle Isle -->
  <text x="434" y="456" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#2A3018">Belle Isle</text>
  <!-- Major street labels -->
  <text x="560" y="251" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#3A2208">BROAD STREET</text>
  <text x="258" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#3A2208" transform="rotate(-3,258,200)">Monument Ave.</text>
  <!-- Neighborhood labels -->
  <text x="520" y="240" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#3A2208">DOWNTOWN</text>
  <text x="260" y="248" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#3A2208">THE FAN</text>
  <text x="700" y="242" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#3A2208">CHURCH</text>
  <text x="700" y="255" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#3A2208">HILL</text>
  <!-- Capitol label -->
  <text x="514" y="226" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#3A2208">Capitol</text>

  <!-- ── TITLE ── -->
  <text x="400" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#3A2208" letter-spacing="5">RICHMOND</text>
  <text x="400" y="80" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#3A2208" letter-spacing="3">VIRGINIA</text>
  <line x1="305" y1="85" x2="495" y2="85" stroke="#3A2208" stroke-width="0.7"/>
  <text x="400" y="98" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#3A2208">At the Falls of the James River</text>

  <!-- ── COMPASS ROSE ── -->
  <g transform="translate(686,422)">
    <circle cx="0" cy="0" r="38" stroke="#3A2208" stroke-width="1" fill="#D4B87A" fill-opacity="0.3"/>
    <circle cx="0" cy="0" r="30" stroke="#3A2208" stroke-width="0.5" fill="none"/>
    <polygon points="0,-35 -6,-11 0,-19 6,-11" fill="#3A2208"/>
    <polygon points="0,35  -6,11  0,19  6,11"  fill="#3A2208" fill-opacity="0.5"/>
    <polygon points="-35,0 -11,-5 -19,0 -11,5" fill="#3A2208" fill-opacity="0.5"/>
    <polygon points="35,0  11,-5  19,0  11,5"  fill="#3A2208" fill-opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#3A2208"/>
    <text x="0"  y="-43" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#3A2208">N</text>
    <text x="0"  y="53"  text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#3A2208">S</text>
    <text x="-48" y="4"  text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#3A2208">W</text>
    <text x="48"  y="4"  text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#3A2208">E</text>
  </g>

  <!-- ── CARTOUCHE ── -->
  <rect x="26" y="390" width="185" height="118" rx="3" stroke="#3A2208" stroke-width="1.5" fill="#D4B87A" fill-opacity="0.25"/>
  <rect x="32" y="396" width="173" height="106" rx="2" stroke="#3A2208" stroke-width="0.5" fill="none"/>
  <text x="118" y="415" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#3A2208" letter-spacing="1">A PLAN OF THE CITY OF</text>
  <text x="118" y="432" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#3A2208">RICHMOND</text>
  <text x="118" y="448" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#3A2208">Capital of Virginia</text>
  <line x1="42" y1="453" x2="194" y2="453" stroke="#3A2208" stroke-width="0.6"/>
  <text x="118" y="466" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#3A2208">Showing the Principal Streets</text>
  <text x="118" y="479" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#3A2208">Neighbourhoods &amp; Public Grounds</text>
  <text x="118" y="494" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3A2208">37°32′ N — 77°28′ W</text>
