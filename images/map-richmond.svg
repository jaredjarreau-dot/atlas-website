  <line x1="370" y1="470" x2="610" y2="470" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="370" y1="484" x2="610" y2="484" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="370" y1="498" x2="610" y2="498" stroke="#8B6A3A" stroke-width="0.6"/>
  <line x1="370" y1="512" x2="610" y2="512" stroke="#8B6A3A" stroke-width="0.6"/>
