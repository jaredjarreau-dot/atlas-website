<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">

  <!-- ══════════════════════════════════════════════════════════
       RICHMOND, VIRGINIA — Antique City Map
       Palette: amber blocks, slate-blue water, sage parks
       ══════════════════════════════════════════════════════════ -->

  <!-- ── JAMES RIVER (blue fill) ── -->
  <path d="M 0,302 C 60,303 120,306 175,316 C 220,325 252,342 278,362
           C 304,382 324,404 350,421 C 376,438 408,447 440,441
           C 472,435 498,420 518,402 C 540,383 556,359 572,338
           C 588,319 610,300 654,292 C 698,287 735,284 800,282
           L 800,322 C 735,324 698,327 654,332
           C 610,340 588,359 572,378 C 556,399 540,423 518,440
           C 498,457 472,472 440,478 C 408,484 376,474 350,457
           C 324,440 304,418 278,398 C 252,378 220,361 175,352
           C 120,342 60,339 0,337 Z"
        fill="#6B9BB8"/>

  <!-- Belle Isle (green island in river) -->
  <ellipse cx="434" cy="452" rx="58" ry="20" fill="#7BA86A"/>
  <ellipse cx="434" cy="452" rx="58" ry="20" fill="none" stroke="#4A6840" stroke-width="0.8"/>

  <!-- ── NEIGHBORHOOD FILLS ── -->

  <!-- Monroe Ward / Downtown core -->
  <polygon points="380,160 660,160 660,312 380,312"
           fill="#D4B87A"/>

  <!-- Jackson Ward (north of downtown, NW) -->
  <polygon points="250,160 380,160 380,248 250,248"
           fill="#C8B070"/>

  <!-- The Fan District (wedge going west) -->
  <polygon points="140,175 380,160 380,312 140,312"
           fill="#CDAA6A"/>

  <!-- Church Hill (east of downtown, elevated) -->
  <polygon points="660,160 758,160 758,310 660,310"
           fill="#D0B872"/>

  <!-- Oregon Hill (south of Fan, above river) -->
  <polygon points="305,312 420,312 420,368 305,368"
           fill="#C8AC6A"/>

  <!-- Manchester / South Side (south bank of river) -->
  <polygon points="370,460 610,460 610,530 370,530"
           fill="#D0B878"/>

  <!-- Fulton (far east) -->
  <polygon points="758,200 800,200 800,340 758,340"
           fill="#C4A860"/>

  <!-- ── PARKS (sage green) ── -->
  <!-- Monroe Park (vertex of the Fan) -->
  <rect x="353" y="264" width="30" height="26" fill="#8BAE72"/>
  <!-- Byrd Park (west in Fan) -->
  <circle cx="180" cy="270" r="22" fill="#8BAE72"/>
  <!-- Capitol Square -->
  <rect x="500" y="228" width="28" height="24" fill="#8BAE72"/>
  <!-- Libby Hill Park (Church Hill) -->
  <circle cx="700" cy="230" r="15" fill="#8BAE72"/>

  <!-- ── STREET GRID — Downtown/Jackson Ward/Church Hill ── -->
  <!-- E–W streets (horizontal), y=160 to y=312, spacing ~19px -->
  <line x1="250" y1="179" x2="758" y2="179" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="250" y1="198" x2="758" y2="198" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="250" y1="217" x2="758" y2="217" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="250" y1="236" x2="758" y2="236" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="250" y1="255" x2="758" y2="255" stroke="#8B6A3A" stroke-width="0.9"/><!-- Broad St -->
  <line x1="250" y1="274" x2="758" y2="274" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="250" y1="293" x2="758" y2="293" stroke="#8B6A3A" stroke-width="0.7"/>

