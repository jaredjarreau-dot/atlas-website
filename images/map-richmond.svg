  <line x1="272" y1="160" x2="272" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="294" y1="160" x2="294" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="316" y1="160" x2="316" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="338" y1="160" x2="338" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="360" y1="160" x2="360" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="382" y1="160" x2="382" y2="368" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="404" y1="160" x2="404" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="426" y1="160" x2="426" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="448" y1="160" x2="448" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="470" y1="160" x2="470" y2="312" stroke="#8B6A3A" stroke-width="0.9"/><!-- 7th St -->
  <line x1="492" y1="160" x2="492" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="514" y1="160" x2="514" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="536" y1="160" x2="536" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="558" y1="160" x2="558" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="580" y1="160" x2="580" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="602" y1="160" x2="602" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="624" y1="160" x2="624" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="646" y1="160" x2="646" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="668" y1="160" x2="668" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="690" y1="160" x2="690" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="712" y1="160" x2="712" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="734" y1="160" x2="734" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="756" y1="160" x2="756" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>

  <!-- ── THE FAN — radiating street grid ── -->
  <!-- Cross streets (E-W across the Fan) -->
  <line x1="140" y1="179" x2="380" y2="179" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="140" y1="198" x2="380" y2="198" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="140" y1="217" x2="380" y2="217" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="140" y1="236" x2="380" y2="236" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="140" y1="255" x2="380" y2="255" stroke="#8B6A3A" stroke-width="0.9"/><!-- Broad St west extension -->
  <line x1="140" y1="274" x2="380" y2="274" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="140" y1="293" x2="380" y2="293" stroke="#8B6A3A" stroke-width="0.7"/>
  <!-- Monument Ave (grand boulevard through The Fan) -->
  <line x1="140" y1="204" x2="380" y2="190" stroke="#5C3C18" stroke-width="2.0"/>
  <!-- Radiating N-S streets (slightly converging toward Monroe Park) -->
  <line x1="162" y1="175" x2="170" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="186" y1="175" x2="192" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="210" y1="175" x2="214" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="234" y1="175" x2="236" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <line x1="258" y1="175" x2="258" y2="312" stroke="#8B6A3A" stroke-width="0.7"/>
  <!-- Boulevard (main N-S boundary of the Fan) -->
  <line x1="144" y1="160" x2="144" y2="368" stroke="#5C3C18" stroke-width="1.8"/>

  <!-- ── MAJOR STREETS (slightly bolder) ── -->
  <!-- Broad St full run (E-W spine) -->
  <line x1="0"   y1="255" x2="800" y2="255" stroke="#5C3C18" stroke-width="1.8"/>
  <!-- Main St -->
  <line x1="250" y1="283" x2="800" y2="283" stroke="#5C3C18" stroke-width="1.4"/>
  <!-- Cary St (south side) -->
  <line x1="140" y1="296" x2="660" y2="296" stroke="#5C3C18" stroke-width="1.2"/>

