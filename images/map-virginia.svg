  <rect x="862" y="12"  width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>
  <rect x="12"  y="542" width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>
  <rect x="862" y="542" width="26" height="26" fill="#4A2E0A" fill-opacity="0.12"/>

  <!-- ── Graticule ── -->
