  <line x1="25" y1="290" x2="875" y2="290" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
  <line x1="25" y1="435" x2="875" y2="435" stroke="#4A2E0A" stroke-width="0.35" stroke-dasharray="5,5"/>
