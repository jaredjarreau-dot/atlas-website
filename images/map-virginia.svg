  <path d="M 278,378 L 296,359 L 314,376" stroke="#4A2E0A" stroke-width="0.8"/>
  <path d="M 312,360 L 330,342 L 348,358" stroke="#4A2E0A" stroke-width="0.8"/>
  <path d="M 346,344 L 364,327 L 382,342" stroke="#4A2E0A" stroke-width="0.8"/>
  <path d="M 380,328 L 398,313 L 415,327" stroke="#4A2E0A" stroke-width="0.8"/>
  <text x="310" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-style="italic" fill="#4A2E0A" transform="rotate(-14,310,310)">Blue Ridge Mountains</text>

  <!-- ── James River ── -->
  <path d="M 72,350 C 110,348 148,346 185,344 C 220,342 255,342 288,345
           C 318,348 345,356 372,368 C 395,378 415,388 435,395
           C 455,402 475,406 495,406 C 515,406 535,402 555,394
           C 572,388 588,380 602,370 C 616,360 628,350 640,344
           C 660,336 685,334 710,336 C 735,338 758,344 778,352 L 826,374"
        stroke="#2A4A5A" stroke-width="2.2" stroke-linecap="round"/>
  <text x="450" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A" letter-spacing="2">James River</text>

  <!-- Potomac River (northern boundary area) -->
  <path d="M 480,118 C 510,122 540,128 568,136 C 595,144 620,154 645,164
           C 668,173 690,183 712,192 C 730,200 748,207 766,213 L 798,228"
        stroke="#2A4A5A" stroke-width="1.8" stroke-linecap="round"/>
  <text x="610" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#2A4A5A" transform="rotate(12,610,140)">Potomac River</text>

  <!-- Appalachian / Allegheny ridges (further west) -->
  <path d="M 72,340 C 82,325 94,310 106,296 C 118,282 130,270 142,260
           C 154,250 166,242 178,238"
        stroke="#4A2E0A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="98" y="308" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A" transform="rotate(-40,98,308)">Allegheny</text>

  <!-- ── City markers ── -->
  <!-- Richmond -->
  <circle cx="498" cy="388" r="6" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1.2"/>
  <text x="498" y="374" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#4A2E0A">Richmond</text>
  <!-- Norfolk/Hampton Roads -->
  <circle cx="770" cy="336" r="5" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1"/>
  <text x="790" y="330" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Norfolk</text>
  <!-- Alexandria/Arlington -->
  <circle cx="736" cy="184" r="4" fill="#4A2E0A" fill-opacity="0.4" stroke="#4A2E0A" stroke-width="1"/>
  <text x="756" y="180" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Alexandria</text>
  <!-- Roanoke -->
  <circle cx="320" cy="390" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="330" y="386" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Roanoke</text>
  <!-- Charlottesville -->
  <circle cx="558" cy="348" r="4" fill="#4A2E0A" fill-opacity="0.3" stroke="#4A2E0A" stroke-width="1"/>
  <text x="568" y="344" font-family="Georgia,serif" font-size="9" fill="#4A2E0A">Charlottesville</text>

  <!-- ── Title ── -->
  <text x="450" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="#4A2E0A" letter-spacing="6">VIRGINIA</text>
  <text x="450" y="88" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A" letter-spacing="3">SIC SEMPER TYRANNIS</text>
  <line x1="330" y1="93" x2="570" y2="93" stroke="#4A2E0A" stroke-width="0.8"/>

  <!-- ── Compass rose ── -->
  <g transform="translate(130,150)">
    <circle cx="0" cy="0" r="36" stroke="#4A2E0A" stroke-width="1"/>
    <circle cx="0" cy="0" r="28" stroke="#4A2E0A" stroke-width="0.5"/>
    <polygon points="0,-33 -6,-10 0,-18 6,-10" fill="#4A2E0A"/>
    <polygon points="0,33  -6,10  0,18  6,10"  fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="-33,0 -10,-5 -18,0 -10,5" fill="#4A2E0A" fill-opacity="0.5"/>
    <polygon points="33,0  10,-5  18,0  10,5"  fill="#4A2E0A" fill-opacity="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#4A2E0A"/>
    <text x="0"   y="-42" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A">N</text>
    <text x="0"   y="51"  text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A">S</text>
    <text x="-45" y="4"   text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A">W</text>
    <text x="45"  y="4"   text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4A2E0A">E</text>
  </g>

  <!-- ── Cartouche ── -->
  <rect x="32" y="430" width="188" height="108" rx="4" stroke="#4A2E0A" stroke-width="1.5" fill="#4A2E0A" fill-opacity="0.05"/>
  <rect x="37" y="435" width="178" height="98"  rx="2" stroke="#4A2E0A" stroke-width="0.5"/>
  <text x="126" y="454" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#4A2E0A">A MAP OF THE</text>
  <text x="126" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#4A2E0A">COMMONWEALTH</text>
  <text x="126" y="486" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#4A2E0A">OF VIRGINIA</text>
  <line x1="48" y1="492" x2="204" y2="492" stroke="#4A2E0A" stroke-width="0.6"/>
  <text x="126" y="506" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">Showing Counties &amp; Principal</text>
  <text x="126" y="519" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#4A2E0A">Rivers of the Old Dominion</text>
  <text x="126" y="532" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4A2E0A">36°31′–39°28′ N</text>
</svg>
