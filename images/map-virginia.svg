  <!-- Chesapeake Bay (simplified inlet on east side) -->
  <path d="M 825,148 C 838,165 845,185 845,210 C 845,235 838,258 826,278
           C 814,298 798,314 780,326 C 762,338 742,346 720,350
           L 700,352 C 685,352 670,350 656,346 L 645,342"
        stroke="#2A4A5A" stroke-width="1.8"/>
  <path d="M 845,210 C 848,225 848,240 845,255" stroke="#2A4A5A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Eastern Shore (narrow peninsula east of the bay) -->
  <path d="M 850,148 C 860,155 865,165 865,178 C 865,200 858,220 848,238
           C 840,254 828,268 815,278" stroke="#4A2E0A" stroke-width="1.5"/>

  <!-- Bay fill suggestion -->
  <path d="M 828,160 C 838,175 843,195 840,218 C 837,240 828,260 815,275
           L 800,285 C 782,296 762,303 740,305 L 720,305 L 700,302 L 680,296"
        stroke="#2A4A5A" stroke-width="0.6" fill="none"/>

  <!-- ── Blue Ridge Mountains ── (diagonal ridge line SW to NE) -->
  <path d="M 118,460 C 145,440 175,418 210,395 C 242,374 278,354 318,334
           C 358,315 398,298 440,284 C 476,272 514,264 550,260"
        stroke="#4A2E0A" stroke-width="2.0" stroke-linecap="round"/>
